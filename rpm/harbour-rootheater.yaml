Name: harbour-rootheater
Summary: RooTheater is a multimedia player for Sailfish OS
Version: 0.9.0
Release: 1
# The contents of the Group field should be one of the groups listed here:
# https://github.com/mer-tools/spectacle/blob/master/data/GROUPS
Group: Qt/Qt
URL: https://github.com/RootGPT-YouTube/RooTheater-SailfishOS
License: GPL-3.0
# This must be generated before uploading a package to a remote build service.
Sources:
- '%{name}-%{version}.tar.bz2'
Description: |
  RooTheater is a multimedia player for Sailfish OS, focused on
  hardware-accelerated playback of local files and network streams.
Configure: none
Builder: qmake5

# Build dependencies resolved via pkgconfig.
PkgConfigBR:
  - sailfishapp >= 1.0.2
  - Qt5Core
  - Qt5Qml
  - Qt5Quick
  - Qt5Multimedia

# Build dependencies without a pkgconfig setup.
PkgBR:
  - desktop-file-utils

# Runtime dependencies which are not automatically detected.
Requires:
  - sailfishsilica-qt5 >= 0.10.9
  - nemo-qml-plugin-configuration-qt5
  - sailfish-components-webview-qt5
  - qt5-plugin-sqldriver-sqlite

# All installed files
Files:
  - '%{_bindir}/%{name}'
  - '%{_datadir}/%{name}'
  - '%{_datadir}/applications/%{name}.desktop'
  - '%{_datadir}/icons/hicolor/*/apps/%{name}.png'
